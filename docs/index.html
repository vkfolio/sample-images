<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VKFolio Sample Images</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    background:#ddd;
}

.info{
    padding:12px;
    text-align:center;
}

a{
    text-decoration:none;
    color:#0066ff;
}
</style>

</head>
<body>

<h1>VKFolio Sample Images</h1>

<div id="gallery" class="gallery"></div>

<script>
const gallery = document.getElementById("gallery");

// Change this number if you add more images
const TOTAL_IMAGES = 2000;

for(let i = 1; i <= TOTAL_IMAGES; i++) {

    const filename = `image-${i}.jpg`;

    gallery.innerHTML += `
        <div class="card">
            <a href="${filename}" target="_blank">
                <img src="${filename}" loading="lazy" alt="${filename}">
            </a>
            <div class="info">
                <strong>${filename}</strong><br><br>
                <a href="${filename}" download>Download</a>
            </div>
        </div>
    `;
}
</script>

</body>
</html>
