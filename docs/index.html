<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VKFolio Sample Images</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f5f5;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    transition:.2s;
}

.card:hover{
    transform:translateY(-4px);
}

img{
    width:100%;
    height:180px;
    object-fit:cover;
    background:#ddd;
}

.info{
    padding:12px;
}

.name{
    font-weight:bold;
    margin-bottom:8px;
    word-break:break-word;
}

a{
    color:#0077ff;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<h1>VKFolio Sample Images</h1>

<div id="gallery" class="grid"></div>

<script>
fetch("images.json")
.then(r => r.json())
.then(images => {

    const gallery=document.getElementById("gallery");

    images.forEach(file=>{

        gallery.innerHTML+=`
        <div class="card">
            <img src="${file}" loading="lazy">
            <div class="info">
                <div class="name">${file}</div>
                <a href="${file}" target="_blank">Open Image</a>
            </div>
        </div>`;
    });

});
</script>

</body>
</html>
